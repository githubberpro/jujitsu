name: Discover jiujitsu.net data source (one-off)

# Manual probe to find jiujitsu.net's backend so we can pull the full ranking.
# Writes data/_discovery.json. Delete this workflow + script once analysed.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run discovery probe
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: node scripts/discover-api.mjs
      - name: Commit findings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/_discovery.json
          git commit -m "chore: jiujitsu.net data-source discovery probe [skip ci]" || echo "no change"
          git push

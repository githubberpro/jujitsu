name: Diagnose lookup (one-off)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DIAG_NAME: "Alexander Sak"
        run: node scripts/diag-lookup.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/_diag.json
          git commit -m "chore: lookup diagnostic [skip ci]" || echo "no change"
          git push

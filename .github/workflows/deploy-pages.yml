name: Deploy Jiu-Jitsu Atlas to GitHub Pages

# Auto-deploys the static site to GitHub Pages on every push to main.
# One-time setup required: Settings ▸ Pages ▸ Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Attempt to enable Pages automatically (works when the plan allows
          # Pages for this repo — i.e. a public repo, or a private repo on a
          # paid plan). Otherwise enable it once via Settings ▸ Pages.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the site — index.html sits at the top level.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
